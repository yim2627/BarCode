name: BarCode
options:
  bundleIdPrefix: com.jiseong
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
targets:
  BarCode:
    type: application
    platform: macOS
    sources:
      - path: BarCode
    info:
      path: BarCode/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: BarCode
        CFBundleDisplayName: BarCode
        CFBundleIconFile: AppIcon
        NSFaceIDUsageDescription: BarCode uses biometrics to protect your codes.
        LSMinimumSystemVersion: "13.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiseong.BarCode
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: BarCode/BarCode.entitlements
